<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Calorie Tracker (Fixed Month Filter)</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; max-width: 900px; margin: 20px auto; padding: 0 20px; color: #333; }
        .section-box { margin-bottom: 25px; padding: 15px; border: 1px solid #ddd; border-radius: 5px; background: #fff; }
        input, select, button { padding: 8px; margin: 5px 0; width: 100%; box-sizing: border-box; }
        button { background: #28a745; color: white; border: none; cursor: pointer; font-weight: bold; border-radius: 3px; }
        button:hover { background: #218838; }
        .btn-group { display: flex; gap: 10px; margin: 15px 0; }
        .export-btn { background: #007bff; }
        .export-btn:hover { background: #0069d9; }
        .import-zone { border: 2px dashed #007bff; padding: 15px; text-align: center; background: #f0f7ff; margin-top: 10px; }
        
        .grid-container { display: flex; gap: 20px; flex-wrap: wrap; }
        .grid-col { flex: 1; min-width: 300px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.95em; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; position: sticky; top: 0; }
        .scroll-table { max-height: 300px; overflow-y: auto; border: 1px solid #ddd; border-radius: 3px; }
        
        /* Update this existing block */
        .toggle-container { 
            margin: 10px 0; 
            font-weight: bold; 
            background: #eee; 
            padding: 10px; 
            border-radius: 4px; 
            display: flex; 
            align-items: center; 
            justify-content: space-around; 
            flex-wrap: wrap; /* Added to let items wrap if they run out of space */
            gap: 10px;       /* Added to keep a clean gap when elements stack */
        }
        .toggle-container label { cursor: pointer; display: flex; align-items: center; gap: 5px; }
        .status-msg { font-size: 0.85em; color: #666; font-style: italic; margin-top: 5px; }
        .badge { background: #ffc107; color: #000; padding: 2px 6px; font-size: 0.8em; border-radius: 10px; font-weight: bold; }

        /* Add this new media query block at the very bottom of your CSS styles */
        @media (max-width: 480px) {
            .toggle-container {
                flex-direction: column;
                align-items: flex-start;
                padding: 12px;
            }
            
            .toggle-container span {
                margin-bottom: 8px;
                border-bottom: 1px solid #ccc;
                width: 100%;
                padding-bottom: 5px;
            }

            /* FIX: Force the radio label to act as a tight row container */
            .toggle-container label {
                display: flex !important;
                flex-direction: row !important;
                align-items: center !important;
                justify-content: flex-start !important;
                width: 100%;
                margin: 6px 0;
                cursor: pointer;
            }

            /* FIX: Override the global 100% width rule for these specific radio circles */
            .toggle-container input[type="radio"] {
                width: auto !important;
                margin: 0 8px 0 0 !important; /* Adds a clean space right after the circle */
                cursor: pointer;
            }
        }
    </style>
</head>
<body>

    <h2>Log Food & Calorie Intake</h2>
    
    <div class="section-box">
        <div class="toggle-container">
            <span>Choose Entry Method:</span>
            <label><input type="radio" name="inputMethod" value="dropdown" checked onchange="toggleInputMethod()"> 📋 Select From Dictionary Dropdown</label>
            <label><input type="radio" name="inputMethod" value="manual" onchange="toggleInputMethod()"> ⌨️ Type New Food Manually</label>
        </div>

        <form id="calorieForm">
            <div id="dropdownFoodWrapper">
                <label>Choose Food:</label>
                <select id="foodDropdown" onchange="handleDropdownSelection(this.value)">
                    <option value="">-- Select a saved food --</option>
                </select>
            </div>

            <div id="manualFoodWrapper" style="display: none;">
                <label>Type Food Item Name:</label>
                <input type="text" id="foodManual" placeholder="e.g., Homemade lasagna">
            </div>
            
            <label>Calories (kcal):</label>
            <input type="number" id="calories" required placeholder="e.g., 450">
            
            <button type="submit">Save Entry</button>
        </form>
    </div>

    <div class="btn-group">
        <button class="export-btn" onclick="exportToExcel()">↓ Export All to Master Excel File</button>
    </div>

    <div class="section-box import-zone">
        <label style="font-weight: bold; display: block; margin-bottom: 5px;">↑ Synchronize with your Calorie_Tracker.xlsx file:</label>
        <input type="file" id="excelFile" accept=".xlsx, .xls" onchange="importFromExcel(event)">
        <div id="dictionaryStatus" class="status-msg">No dictionary loaded. Upload your Excel to sync.</div>
    </div>

    <div class="grid-container">
        
        <div class="grid-col">
            <h3>Your History Logs</h3>
            <label>Filter History View By Month:</label>
            <select id="monthFilter" onchange="renderHistoryTable()"></select>
            
            <div class="scroll-table" style="margin-top: 10px;">
                <div id="historyTableContainer"></div>
            </div>
        </div>

        <div class="grid-col">
            <h3>Master Food Dictionary</h3>
            <div class="status-msg" style="margin-bottom: 10px;">Foods saved here will appear automatically in your entry dropdown choice list.</div>
            
            <div class="scroll-table">
                <table>
                    <thead>
                        <tr>
                            <th>Food Item</th>
                            <th>Default Calories</th>
                        </tr>
                    </thead>
                    <tbody id="dictionaryTableBody">
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        const STORAGE_KEY = 'calorie_tracker_data';
        const DICTIONARY_KEY = 'calorie_tracker_dict';

        let calorieEntries = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        let foodDictionary = JSON.parse(localStorage.getItem(DICTIONARY_KEY)) || {};

        const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];

        function getFormattedDate(dateObj) {
            const day = String(dateObj.getDate()).padStart(2, '0');
            const month = String(dateObj.getMonth() + 1).padStart(2, '0');
            const year = dateObj.getFullYear();
            return `${day}/${month}/${year}`;
        }

        function toggleInputMethod() {
            const method = document.querySelector('input[name="inputMethod"]:checked').value;
            const dropdownWrapper = document.getElementById('dropdownFoodWrapper');
            const manualWrapper = document.getElementById('manualFoodWrapper');
            
            if (method === 'dropdown') {
                dropdownWrapper.style.display = 'block';
                manualWrapper.style.display = 'none';
                document.getElementById('foodManual').required = false;
                handleDropdownSelection(document.getElementById('foodDropdown').value);
            } else {
                dropdownWrapper.style.display = 'none';
                manualWrapper.style.display = 'block';
                document.getElementById('foodManual').required = true;
            }
        }

        function handleDropdownSelection(selectedFood) {
            if (selectedFood && foodDictionary[selectedFood]) {
                document.getElementById('calories').value = foodDictionary[selectedFood];
            } else {
                document.getElementById('calories').value = '';
            }
        }

        // Form Submission Logic
        document.getElementById('calorieForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const method = document.querySelector('input[name="inputMethod"]:checked').value;
            let foodName = "";
            
            if (method === 'dropdown') {
                foodName = document.getElementById('foodDropdown').value;
                if (!foodName) {
                    alert("Please select a food item or switch to manual input typing.");
                    return;
                }
            } else {
                foodName = document.getElementById('foodManual').value.trim();
            }

            const caloriesValue = parseInt(document.getElementById('calories').value);
            const now = new Date();
            const forceCustomDate = getFormattedDate(now);

            const newEntry = {
                id: Date.now(),
                date: forceCustomDate, 
                monthYear: `${monthNames[now.getMonth()]} ${now.getFullYear()}`,
                food: foodName,
                calories: caloriesValue
            };
            calorieEntries.push(newEntry);

            if (!foodDictionary[foodName]) {
                foodDictionary[foodName] = caloriesValue;
                localStorage.setItem(DICTIONARY_KEY, JSON.stringify(foodDictionary));
                alert(`✨ New Food Learned! Added "${foodName}" (${caloriesValue} kcal) to your Dictionary.`);
            }

            localStorage.setItem(STORAGE_KEY, JSON.stringify(calorieEntries));
            
            document.getElementById('calorieForm').reset();
            updateInterfaceViews();
            
            document.querySelector(`input[name="inputMethod"][value="${method}"]`).checked = true;
            toggleInputMethod();
        });

        // CRITICAL FIX: Rebuild dropdown and refresh display states completely
        function updateInterfaceViews() {
            populateFormDropdown();
            populateFilterOptions();
            renderHistoryTable();
            renderDictionaryTable();
        }

        function populateFormDropdown() {
            const dropdown = document.getElementById('foodDropdown');
            const currentVal = dropdown.value;
            dropdown.innerHTML = '<option value="">-- Select a saved food --</option>';
            Object.keys(foodDictionary).sort().forEach(food => {
                dropdown.innerHTML += `<option value="${food}">${food}</option>`;
            });
            dropdown.value = foodDictionary[currentVal] ? currentVal : "";
        }

        function renderDictionaryTable() {
            const tbody = document.getElementById('dictionaryTableBody');
            tbody.innerHTML = '';
            const sortedFoods = Object.keys(foodDictionary).sort();
            
            if (sortedFoods.length === 0) {
                tbody.innerHTML = '<tr><td colspan="2" style="text-align:center; color:#888;">Dictionary empty. Sync Excel or type items manually.</td></tr>';
                document.getElementById('dictionaryStatus').innerText = "No dictionary loaded.";
                return;
            }

            sortedFoods.forEach(food => {
                tbody.innerHTML += `<tr>
                    <td><strong>${food}</strong></td>
                    <td>${foodDictionary[food]} kcal</td>
                </tr>`;
            });
            document.getElementById('dictionaryStatus').innerText = `✅ Active Dictionary contains ${sortedFoods.length} items.`;
        }

        // FIXED: Extracts unique months from historical arrays and populates options
        function populateFilterOptions() {
            const filterSelect = document.getElementById('monthFilter');
            const currentSelection = filterSelect.value || 'All';
            
            // Collect all unique months stored in the data
            const uniqueMonths = [...new Set(calorieEntries.map(item => item.monthYear))];
            
            filterSelect.innerHTML = '<option value="All">Show All Months</option>';
            uniqueMonths.forEach(month => {
                filterSelect.innerHTML += `<option value="${month}">${month}</option>`;
            });

            // Re-apply selection if it still exists, otherwise default to 'All'
            if (uniqueMonths.includes(currentSelection) || currentSelection === 'All') {
                filterSelect.value = currentSelection;
            } else {
                filterSelect.value = 'All';
            }
        }

        function renderHistoryTable() {
            const filterValue = document.getElementById('monthFilter').value || 'All';
            const container = document.getElementById('historyTableContainer');
            
            const filteredEntries = filterValue === 'All' 
                ? calorieEntries 
                : calorieEntries.filter(item => item.monthYear === filterValue);

            if (filteredEntries.length === 0) {
                container.innerHTML = '<p style="padding:10px; color:#888; text-align:center;">No tracking entries found for this selection.</p>';
                return;
            }

            let html = `<table>
                <thead><tr><th>Date</th><th>Food Item</th><th>Calories</th></tr></thead>
                <tbody>`;
            
            // Show newest items first without distorting original array data
            const displayList = [...filteredEntries].reverse();
            displayList.forEach(entry => { 
                html += `<tr>
                    <td>${entry.date}</td>
                    <td>${entry.food}</td>
                    <td><span class="badge">${entry.calories} kcal</span></td>
                </tr>`;
            });
            html += '</tbody></table>';
            container.innerHTML = html;
        }

        function exportToExcel() {
            if (calorieEntries.length === 0 && Object.keys(foodDictionary).length === 0) {
                alert("No data available to export!");
                return;
            }

            const wb = XLSX.utils.book_new();
            const groupedData = {};

            calorieEntries.forEach(entry => {
                if (!groupedData[entry.monthYear]) {
                    groupedData[entry.monthYear] = [];
                }
                groupedData[entry.monthYear].push({
                    'Date': entry.date, 
                    'Food Item': entry.food,
                    'Calories': entry.calories
                });
            });

            for (const monthName in groupedData) {
                const ws = XLSX.utils.json_to_sheet(groupedData[monthName]);
                XLSX.utils.book_append_sheet(wb, ws, monthName);
            }

            const dictRows = Object.keys(foodDictionary).map(key => ({
                'Food Item': key,
                'Calories': foodDictionary[key]
            }));
            
            const wsDict = XLSX.utils.json_to_sheet(dictRows);
            XLSX.utils.book_append_sheet(wb, wsDict, 'Food_Dictionary');

            XLSX.writeFile(wb, "Calorie_Tracker.xlsx");
        }

        function importFromExcel(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                
                const importedEntries = [];
                let importedDict = {};

                workbook.SheetNames.forEach(sheetName => {
                    const worksheet = workbook.Sheets[sheetName];
                    const rows = XLSX.utils.sheet_to_json(worksheet);
                    
                    if (sheetName === 'Food_Dictionary') {
                        rows.forEach(row => {
                            if (row['Food Item'] && row['Calories'] !== undefined) {
                                importedDict[row['Food Item']] = parseInt(row['Calories']);
                            }
                        });
                    } else {
                        rows.forEach((row, index) => {
                            if (row['Date'] && row['Food Item'] && row['Calories'] !== undefined) {
                                importedEntries.push({
                                    id: Date.now() + index,
                                    date: row['Date'], 
                                    monthYear: sheetName,
                                    food: row['Food Item'],
                                    calories: parseInt(row['Calories'])
                                });
                            }
                        });
                    }
                });

                foodDictionary = importedDict;
                localStorage.setItem(DICTIONARY_KEY, JSON.stringify(foodDictionary));

                if (importedEntries.length > 0) {
                    if (confirm(`Excel parsed successfully! Found ${importedEntries.length} calendar tracking items. Overwrite current log view?`)) {
                        calorieEntries = importedEntries;
                        localStorage.setItem(STORAGE_KEY, JSON.stringify(calorieEntries));
                    }
                }
                
                updateInterfaceViews();
                alert("Data sync processing fully completed!");
                document.getElementById('excelFile').value = "";
            };
            reader.readAsArrayBuffer(file);
        }

        // Run all interface initializers immediately on page load
        updateInterfaceViews();
        toggleInputMethod();
    </script>
</body>
</html>
